services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django
      - nuxt

  django:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
      - git_repos:/app/git_repos
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio

  celery:
    build: ./backend
    command: celery -A config worker -l info --concurrency=2
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
      - git_repos:/app/git_repos
    depends_on:
      - django
      - redis

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: staxread
      POSTGRES_PASSWORD: staxread
      POSTGRES_DB: staxread
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: staxread
      MINIO_ROOT_PASSWORD: staxread-secret
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"

  nuxt:
    build: ./frontend
    env_file: .env
    depends_on:
      - django

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  git_repos:
  model_cache:

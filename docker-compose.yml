services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      django:
        condition: service_healthy
      nuxt:
        condition: service_started

  django:
    build: ./backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
      - git_repos:/app/git_repos
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  celery:
    build: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    env_file: .env
    volumes:
      - model_cache:/app/model_cache
      - git_repos:/app/git_repos
    depends_on:
      django:
        condition: service_healthy

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      django:
        condition: service_healthy

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-staxread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staxread}
      POSTGRES_DB: ${POSTGRES_DB:-staxread}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-staxread}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-staxread}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-staxread-secret}
    volumes:
      - minio_data:/data

  nuxt:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - django

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  git_repos:
  model_cache:
